name: Build & Release s&box

on:
  push:
    tags:
      - 'v*'          # срабатывает на теги вида v26.04.28-abc1234 от sync-upstream
  workflow_dispatch:  # ручной запуск

permissions:
  contents: write     # нужно для создания Release

jobs:
  build:
    name: Compile Engine
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # ── 2. .NET 10 SDK ────────────────────────────────────────────────────
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # ── 3. Кэш NuGet ─────────────────────────────────────────────────────
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: nuget-${{ runner.os }}-

      # ── 4. Кэш зависимостей Bootstrap ────────────────────────────────────
      - name: Cache Bootstrap dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/deps
          key: deps-${{ runner.os }}-${{ hashFiles('Bootstrap.bat') }}
          restore-keys: deps-${{ runner.os }}-

      # ── 5. Сборка ─────────────────────────────────────────────────────────
      - name: Run Bootstrap
        shell: cmd
        run: Bootstrap.bat
        env:
          CI: true

      # ── 6. Упаковываем артефакт в zip ─────────────────────────────────────
      - name: Package build output
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "sbox-build-${tag}.zip"
          Compress-Archive -Path "game\bin\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      # ── 7. Загружаем логи при ошибке ──────────────────────────────────────
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.ref_name }}
          path: |
            **/*.log
            **/*.binlog
          retention-days: 3

      # ── 8. Создаём GitHub Release и заливаем zip ──────────────────────────
      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "s&box ${{ github.ref_name }}"
          body: |
            🔄 Автоматическая сборка из [Facepunch/sbox-public](https://github.com/Facepunch/sbox-public)
            
            **Тег:** `${{ github.ref_name }}`
          files: ${{ env.ZIP_NAME }}
          fail_on_unmatched_files: true
