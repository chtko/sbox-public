name: Build & Release s&box

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compile Engine
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # ── 2. .NET 10 SDK ────────────────────────────────────────────────────
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # ── 3. Кэш NuGet ─────────────────────────────────────────────────────
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: nuget-${{ runner.os }}-

      # ── 4. Кэш зависимостей Bootstrap (нативные бинарники) ───────────────
      - name: Cache Bootstrap dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/deps
          key: deps-${{ runner.os }}-${{ hashFiles('Bootstrap.bat') }}
          restore-keys: deps-${{ runner.os }}-

      # ── 5. Bootstrap: скачивает нативный движок + собирает C# часть ───────
      - name: Run Bootstrap
        shell: cmd
        run: Bootstrap.bat
        env:
          CI: true

      # ── 6. Упаковываем всё в zip (нативники + managed DLL) ────────────────
      - name: Package full build
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "sbox-$tag.zip"

          # Пакуем всю папку game/ — там и нативный движок, и C# DLL
          Compress-Archive -Path "game\*" -DestinationPath $zipName

          $sizeMB = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          echo "ZIP_NAME=$zipName"   >> $env:GITHUB_ENV
          echo "ZIP_SIZE=${sizeMB} MB" >> $env:GITHUB_ENV
          Write-Host "✅ Упаковано: $zipName ($sizeMB MB)"

      # ── 7. Логи при ошибке ────────────────────────────────────────────────
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.ref_name }}
          path: |
            **/*.log
            **/*.binlog
          retention-days: 3

      # ── 8. Создаём Release и заливаем готовый zip ─────────────────────────
      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "s&box ${{ github.ref_name }}"
          body: |
            ## 📦 s&box ${{ github.ref_name }}

            Автоматическая сборка из [Facepunch/sbox-public](https://github.com/Facepunch/sbox-public)

            ### Содержимое архива
            - ✅ Нативный движок (C++ бинарники, скачаны Bootstrap'ом)
            - ✅ Managed часть (C# DLL, собрана из исходников)

            ### Как запустить
            1. Скачай `sbox-${{ github.ref_name }}.zip`
            2. Распакуй в любую папку
            3. Запусти `sbox.exe`

            > ⚠️ Нативные бинарники распространяются под [s&box EULA](https://sbox.game/eula)
          files: ${{ env.ZIP_NAME }}
          fail_on_unmatched_files: true
